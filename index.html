<!DOCTYPE html>
<html>
<head>
  <title>Spotify Top Tracks</title>
</head>
<body>

<button onclick="login()">Login with Spotify</button>
<pre id="output"></pre>

<script>
const clientId = "YOUR_CLIENT_ID";
const redirectUri = window.location.origin;

function login() {
  const scopes = "user-top-read";
  window.location = `https://accounts.spotify.com/authorize?client_id=${clientId}&response_type=token&redirect_uri=${redirectUri}&scope=${scopes}`;
}

// Get token from URL
function getTokenFromUrl() {
  const hash = window.location.hash;
  if (!hash) return null;

  const params = new URLSearchParams(hash.substring(1));
  return params.get("access_token");
}

async function fetchWebApi(endpoint, method, token, body) {
  const res = await fetch(`https://api.spotify.com/${endpoint}`, {
    headers: {
      Authorization: `Bearer ${token}`,
      "Content-Type": "application/json"
    },
    method,
    body: body ? JSON.stringify(body) : undefined
  });
  return await res.json();
}

async function getTopTracks(token) {
  return (await fetchWebApi(
    'v1/me/top/tracks?time_range=long_term&limit=5',
    'GET',
    token
  )).items;
}

async function init() {
  const token = getTokenFromUrl();

  if (!token) {
    document.getElementById("output").textContent = "Click login button first";
    return;
  }

  const tracks = await getTopTracks(token);

  const result = tracks.map(
    t => `${t.name} - ${t.artists.map(a => a.name).join(", ")}`
  ).join("\n");

  document.getElementById("output").textContent = result;
}

init();
</script>

</body>

<!DOCTYPE html>
<html>
<head>
  <title>BeatNova</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black; color:white; font-family:sans-serif; text-align:center;">

<h2>🎧 BeatNova</h2>

<input type="text" id="search" placeholder="Search songs..." style="padding:10px; width:80%; border-radius:10px;">

<div id="results"></div>

<script>
const clientId = "YOUR_CLIENT_ID";
const redirectUri = window.location.origin;

let token = null;

function login() {
  const scopes = "user-read-private";
  window.location =
    `https://accounts.spotify.com/authorize?client_id=${clientId}&response_type=token&redirect_uri=${redirectUri}&scope=${scopes}`;
}

function getToken() {
  const hash = window.location.hash;
  if (!hash) return null;
  return new URLSearchParams(hash.substring(1)).get("access_token");
}

async function api(endpoint) {
  const res = await fetch(`https://api.spotify.com/v1/${endpoint}`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  return await res.json();
}

document.getElementById("search").addEventListener("keyup", async (e) => {
  const q = e.target.value;
  if (!q) return;

  const data = await api(`search?q=${q}&type=track&limit=5`);

  let html = "";
  data.tracks.items.forEach(song => {
    html += `
      <div style="margin:10px; padding:10px; background:#1db954; border-radius:10px;">
        <img src="${song.album.images[0].url}" width="100"><br>
        <b>${song.name}</b><br>
        ${song.artists[0].name}<br>
        ${song.preview_url ? `<audio controls src="${song.preview_url}"></audio>` : "No Preview"}
      </div>
    `;
  });

  document.getElementById("results").innerHTML = html;
});

token = getToken();

if (!token) {
  alert("Login first (add login button later)");
}
</script>

</body>
</html>
